<form method="post" action="{% url 'dashboard:crm_deal_update_modal' deal.id %}" class="js-deal-update-form">
    {% csrf_token %}
    <input type="hidden" name="deal_kind" value="{{ deal_kind }}">
    <div class="mb-2 small text-muted">Deal: <strong>{{ deal.proposal_id|default:deal.sunrun_service_contract_id|default:deal.id }}</strong></div>
    <div class="mb-3">
        <label class="form-label" for="{{ form.salesrep.id_for_label }}">Asociado</label>
        {{ form.salesrep }}
    </div>
    <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
    </div>
</form>
