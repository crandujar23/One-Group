{% extends 'partials/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block extra_css %}
<style>
.quick-access-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: .75rem;
}
@media (min-width: 1200px) {
    .quick-access-grid.quick-access-grid--five {
        grid-template-columns: repeat(12, minmax(0, 1fr));
    }
    .quick-access-grid.quick-access-grid--five .quick-access-card {
        grid-column: span 4;
    }
    .quick-access-grid.quick-access-grid--five .quick-access-card:nth-child(4) {
        grid-column: 3 / span 4;
    }
    .quick-access-grid.quick-access-grid--five .quick-access-card:nth-child(5) {
        grid-column: 7 / span 4;
    }
}
.quick-access-card {
    display: block;
    border: 1px solid #dbe5f4;
    border-radius: .9rem;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    text-decoration: none;
    padding: .9rem 1rem;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.quick-access-card:hover {
    transform: translateY(-2px);
    border-color: #9ec5ff;
    box-shadow: 0 10px 22px rgba(30, 64, 175, .12);
}
.quick-access-head {
    display: flex;
    align-items: center;
    gap: .55rem;
    margin-bottom: .25rem;
}
.quick-access-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: .95rem;
    color: #1d4ed8;
    background: #eaf2ff;
}
.quick-access-title {
    margin: 0;
    color: #1e293b;
    font-weight: 700;
    font-size: .98rem;
}
.quick-access-desc {
    margin: 0;
    color: #64748b;
    font-size: .84rem;
    line-height: 1.35;
}
</style>
{% endblock %}

{% block content %}
<section class="hero-card p-4 mb-4 reveal">
    <h1 class="h3 mb-2">{{ title }}</h1>
    <p class="mb-0 opacity-75">{{ subtitle }}</p>
</section>

<section class="section-card p-3 mb-4 reveal reveal-delay-1">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="h6 mb-0">Accesos rapidos del equipo</h2>
    </div>
    <div class="quick-access-grid {% if quick_links|length == 5 %}quick-access-grid--five{% endif %}">
        {% for link in quick_links %}
        <a class="quick-access-card" href="{{ link.url }}">
            <div class="quick-access-head">
                <span class="quick-access-icon"><i class="bi {{ link.icon }}"></i></span>
                <h3 class="quick-access-title">{{ link.label }}</h3>
            </div>
            <p class="quick-access-desc">{{ link.description }}</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
